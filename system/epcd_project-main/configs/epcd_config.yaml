dataset:
  name: "SCCD" 
  raw_path: "data/raw/"
  processed_path: "data/processed/"
  session_col: "session_id"
  user_col: "user_id"
  text_col: "text"
  timestamp_col: "timestamp"
  reply_to_col: "reply_to_user_id"
  label_col: "is_bullying"

graph:
  num_time_windows: 10          
  window_size_minutes: 10       # 每个时间窗口长度

path:
  top_k_seed_ratio: 0.2         # η
  max_path_length: 5            # L_max

core_bg:
  lambda_balance: 0.6           # λ
  alpha_smooth: 0.7             # α 平滑系数
  core_ratio: 0.3              

model:
  node_feat_dim: 6              # 结构3 + 情感3
  gcn_hidden_dim: 64
  lstm_hidden_dim: 64
  path_repr_dim: 64
  num_gcn_layers: 2

train:
  learning_rate: 1e-3
  batch_size: 1                 # 每个会话为一个batch
  epochs: 50
  early_stop_patience: 5
  device: "cuda" if available else "cpu"

explain:
  lambda_path: 0.5
  lambda_node: 0.5
  eval_samples: 100             # 可解释性评估样本数
  top_k_paths: [1, 3, 5]